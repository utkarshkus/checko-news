# ══════════════════════════════════════════════════════
#  Checko Intelligence Hub — Netlify Configuration
#  Audit fixes applied:
#   [P9]  /api/* excluded from SPA catch-all redirect
#   [S2]  Content-Security-Policy header added
#   [S3]  Strict-Transport-Security (HSTS) added
#   [S4]  X-XSS-Protection added
# ══════════════════════════════════════════════════════

[build]
  publish = "public"
  command = "echo 'Static site — no build step needed'"

# Tell Netlify where to install function dependencies from.
# The root package.json has NO dependencies so Netlify's npm install
# completes instantly. Function deps live in netlify/functions/package.json
# and are bundled by esbuild at deploy time — no separate install needed.
[build.environment]
  NODE_VERSION = "20"

# ── Functions ──────────────────────────────────────────
[functions]
  directory     = "netlify/functions"
  node_bundler  = "esbuild"

# ── Scheduled function: daily 00:30 UTC = 06:00 IST ───
[[scheduled-functions]]
  name = "fetch-news"
  cron = "30 0 * * *"

# ── Edge function: serves /api/news from Netlify Blobs ─
[[edge_functions]]
  path     = "/api/news"
  function = "get-news"

# ── Redirects ──────────────────────────────────────────
# [P9] Exclude /api/* from the SPA catch-all so the edge
#      function always takes priority over index.html.
[[redirects]]
  from   = "/api/*"
  to     = "/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ══════════════════════════════════════════════════════
#  SECURITY HEADERS
# ══════════════════════════════════════════════════════

[[headers]]
  for = "/*"
  [headers.values]
    # [S3] HSTS — force HTTPS for 1 year, include subdomains
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # [S2] CSP — whitelist only what the page actually needs:
    #   - default-src:   own origin only
    #   - script-src:    own origin + 'unsafe-inline' (required for static inline <script>)
    #   - style-src:     own origin + Google Fonts + 'unsafe-inline' (inline styles)
    #   - font-src:      Google Fonts CDN
    #   - img-src:       own origin + http/https (news images from any domain)
    #   - connect-src:   own origin (for /api/news fetch)
    #   - frame-ancestors: DENY (replaces X-Frame-Options)
    #   - base-uri:      restrict <base> tag hijacking
    #   - form-action:   no form submissions
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https: http:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'none'"

    # [S4] Legacy XSS protection for older browsers
    X-XSS-Protection         = "1; mode=block"

    # Existing headers retained
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "geolocation=(), microphone=(), camera=(), payment=()"

# ── API route headers ──────────────────────────────────
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"

# ── Static asset caching ───────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── HTML — short cache, always revalidate ─────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
